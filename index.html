<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>My Game Dev Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; text-align: center; }
        header { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; padding: 50px 20px; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
        <p>3rd Year Digital Game Student @ CAMT</p>
    </header>

    <div class="container">
        <h2>My Projects</h2>
        <div class="project-grid">
            <div class="card">
                <img src="https://via.placeholder.com/300x180" alt="Game 1">
                <div class="card-content">
                    <h3>Let Him Cook</h3>
                    <p>Adventure cooking game using Unity</p>
                </div>
            </div>
            </div>
    </div>
</body>
</html>
